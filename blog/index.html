<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blog | Levity Ltd</title>
    <link rel="icon" href="../assets/cloud-icon.svg" type="image/svg+xml">
    <link rel="icon" href="../assets/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="../assets/favicon-48.png" sizes="48x48" type="image/png">
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" sizes="180x180">
    <link rel="preload" as="image" href="../assets/brand/Levity%20Logo.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Satisfy&display=swap" rel="stylesheet">
    <style>
      :root {
        --levity-lilac: #b1a1ed;
        --levity-limelight: #c1ff72;
        --levity-eggplant: #564f74;
        --levity-cloud: #fbfaf0;
        --font-body: "Nunito", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
        background: var(--levity-lilac);
      }

      body {
        min-height: 100dvh;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(193, 255, 114, 0.28), transparent 34rem),
          linear-gradient(180deg, var(--levity-lilac), #9586d5 68%, var(--levity-eggplant));
        color: var(--levity-cloud);
        cursor: none;
        font-family: var(--font-body);
      }

      a {
        color: inherit;
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
        padding: 14px 0 8px;
      }

      .brand-link {
        display: inline-flex;
        align-items: center;
        transform: translateX(-18px);
        color: #ffffff;
        text-decoration: none;
      }

      .brand-link img {
        width: 173px;
        height: 173px;
        object-fit: contain;
        animation: logo-float 6s ease-in-out infinite;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08));
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(12, 6, 34, 0.2);
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.13);
        color: #ffffff;
        font-size: 0.95rem;
        font-weight: 800;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .book-link {
        background: var(--levity-limelight);
        color: var(--levity-eggplant);
      }

      .nav-link:hover,
      .nav-link:focus-visible,
      .post-card:hover,
      .post-card:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(193, 255, 114, 0.45);
        outline: none;
      }

      main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        width: min(1120px, calc(100% - 40px));
        height: calc(100dvh - 166px);
        margin: 0 auto;
        padding: 14px 0 24px;
      }

      .page-heading {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: end;
        gap: 8px;
        margin-bottom: 18px;
      }

      .page-label {
        grid-column: 1 / span 2;
        margin: 0;
        color: var(--levity-limelight);
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        line-height: 1;
        text-transform: uppercase;
      }

      .repel-letter {
        display: inline-block;
        transition: transform 0.16s ease-out;
        will-change: transform;
      }

      .details-heading {
        grid-column: 2 / span 2;
        margin: 0;
        color: #ffffff;
        font-size: 1rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        line-height: 1;
        text-transform: uppercase;
      }

      .blog-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
        min-height: 0;
      }

      .post-list {
        grid-column: 1;
        display: grid;
        grid-template-columns: 1fr;
        align-content: start;
        gap: 18px;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding-right: 8px;
        scrollbar-color: rgba(193, 255, 114, 0.7) rgba(255, 255, 255, 0.12);
      }

      .post-list::-webkit-scrollbar {
        width: 8px;
      }

      .post-list::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .post-list::-webkit-scrollbar-thumb {
        background: rgba(193, 255, 114, 0.7);
        border-radius: 999px;
      }

      .post-card {
        display: grid;
        align-content: end;
        min-height: 66px;
        aspect-ratio: auto;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.14);
        color: #ffffff;
        text-decoration: none;
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(12, 6, 34, 0.28);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .post-card.is-selected {
        border-color: rgba(193, 255, 114, 0.82);
        box-shadow: 0 10px 20px rgba(193, 255, 114, 0.45);
      }

      .post-card h2 {
        margin: 0;
        color: #ffffff;
        font-size: clamp(1.2rem, 2vw, 1.7rem);
        font-weight: 800;
        line-height: 1.05;
      }

      .post-type {
        margin: 10px 0 0;
        color: var(--levity-limelight);
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hover-panel {
        grid-column: 2 / span 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 90%;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.26);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(12, 6, 34, 0.18);
        scrollbar-color: rgba(193, 255, 114, 0.7) rgba(255, 255, 255, 0.12);
        transition: background 0.2s ease, box-shadow 0.2s ease;
      }

      .hover-panel::-webkit-scrollbar {
        width: 8px;
      }

      .hover-panel::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .hover-panel::-webkit-scrollbar-thumb {
        background: rgba(193, 255, 114, 0.7);
        border-radius: 999px;
      }

      .hover-panel p {
        margin: 0;
        color: rgba(255, 255, 255, 0.84);
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.35;
        text-align: center;
      }

      .hover-panel.is-filled {
        align-items: flex-start;
        justify-content: flex-start;
        columns: 1;
      }

      .hover-panel.is-filled p {
        display: block;
        width: 100%;
        break-inside: avoid;
        column-span: none;
        color: var(--levity-eggplant);
        font-size: 0.92rem;
        font-weight: 800;
        line-height: 1.45;
        text-align: left;
      }

      .hover-panel.is-filled p + p {
        margin-top: 16px;
      }

      .blog-grid:has(.post-card:hover) .hover-panel,
      .blog-grid:has(.post-card:focus-visible) .hover-panel {
        background: rgba(193, 255, 114, 0.6);
        box-shadow: 0 10px 20px rgba(193, 255, 114, 0.45);
      }

      .blog-grid.has-selected-post .hover-panel {
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 12px 28px rgba(12, 6, 34, 0.18);
      }

      @media (max-width: 900px) {
        .page-heading {
          grid-template-columns: 1fr;
        }

        .page-label {
          grid-column: auto;
        }

        .blog-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .post-list {
          grid-template-columns: 1fr;
        }

        .post-list,
        .hover-panel {
          grid-column: auto;
          grid-row: auto;
        }

        .details-heading,
        .hover-panel {
          display: none;
        }
      }

      @media (max-width: 720px) {
        .site-header {
          width: min(100% - 28px, 1120px);
          align-items: flex-start;
        }

        .nav-links {
          gap: 8px;
        }

        .nav-link {
          min-height: 40px;
          padding: 0 14px;
          font-size: 0.88rem;
        }

        main {
          width: min(100% - 28px, 1120px);
          height: calc(100dvh - 166px);
          padding-top: 30px;
        }

        .page-heading {
          margin-bottom: 28px;
        }

        .blog-grid,
        .post-list {
          grid-template-columns: 1fr;
        }
      }

      @keyframes logo-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .brand-link img {
          animation: none;
        }
      }

      .cursor-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }

      .cursor-dot,
      .cursor-trail {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow:
          0 0 6px rgba(255, 255, 255, 0.9),
          0 0 12px rgba(255, 194, 236, 0.8),
          0 0 18px rgba(193, 255, 114, 0.7);
        transform: translate(-100px, -100px);
        transition: transform 0.02s linear;
      }

      .cursor-trail {
        width: 6px;
        height: 6px;
        opacity: 0.7;
        filter: blur(0.2px);
      }

      @media (pointer: coarse) {
        body {
          cursor: none;
        }
      }
    </style>
  </head>
  <body>

      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>

      <span class="cursor-trail"></span>

    <header class="site-header">
      <a class="brand-link" href="../" aria-label="Levity Ltd home">

    </header>
    <main>

          <span class="repel-letter" aria-hidden="true">B</span><span class="repel-letter" aria-hidden="true">l</span><span class="repel-letter" aria-hidden="true">o</span><span class="repel-letter" aria-hidden="true">g</span>

      <section class="blog-grid" aria-label="Levity blog">

    </main>
    <script>
      const cursorDot = document.querySelector(".cursor-dot");
      const cursorTrail = [...document.querySelectorAll(".cursor-trail")];
      const repelLetters = [...document.querySelectorAll(".repel-letter")];
      const hoverPanel = document.querySelector(".hover-panel");
      const blogGrid = document.querySelector(".blog-grid");
      const postCards = [...document.querySelectorAll(".post-card")];
      const defaultHoverPanelMarkup = hoverPanel ? hoverPanel.innerHTML : "";
      let selectedPostCard = null;
      const clickSound = new Audio("../assets/audio/boop.wav");
      clickSound.volume = 0.35;
      const pointer = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      const positions = Array.from({ length: 12 }, () => ({ ...pointer }));

      const setPointerPosition = (x, y, shouldSnap = false) => {
        pointer.x = x;
        pointer.y = y;

        if (!shouldSnap) return;

        positions.forEach((position) => {
          position.x = x;
          position.y = y;
        });
      };

      const updatePointer = (event) => {
        setPointerPosition(event.clientX, event.clientY);
      };

      const updateTouchPointer = (event) => {
        const touch = event.touches && event.touches[0];
        if (!touch) return;
        setPointerPosition(touch.clientX, touch.clientY, event.type === "touchstart");
      };

      const playClickSound = (event) => {
        if (event.button && event.button !== 0) return;
        const sound = clickSound.cloneNode();
        sound.volume = clickSound.volume;
        sound.play().catch(() => {});
      };

      const setPostDetails = (postCard) => {
        if (!hoverPanel) return;

        const templateId = postCard.dataset.detailsTemplate;
        const template = templateId ? document.getElementById(templateId) : null;

        if (template) {
          hoverPanel.innerHTML = template.innerHTML;
          hoverPanel.classList.add("is-filled");
          return;
        }

        hoverPanel.innerHTML = defaultHoverPanelMarkup;
        hoverPanel.classList.remove("is-filled");
      };

      const resetPostDetails = () => {
        if (selectedPostCard) return;
        if (!hoverPanel) return;
        hoverPanel.innerHTML = defaultHoverPanelMarkup;
        hoverPanel.classList.remove("is-filled");
      };

      const selectPostCard = (postCard) => {
        selectedPostCard = postCard;
        if (blogGrid) {
          blogGrid.classList.add("has-selected-post");
        }
        postCards.forEach((card) => {
          card.classList.toggle("is-selected", card === postCard);
        });
        setPostDetails(postCard);
      };

      postCards.forEach((postCard) => {
        postCard.addEventListener("mouseenter", () => setPostDetails(postCard));
        postCard.addEventListener("focus", () => setPostDetails(postCard));
        postCard.addEventListener("mouseleave", resetPostDetails);
        postCard.addEventListener("blur", resetPostDetails);
        postCard.addEventListener("click", (event) => {
          event.preventDefault();
          selectPostCard(postCard);
        });
      });

      const animateCursor = () => {
        positions[0].x += (pointer.x - positions[0].x) * 0.22;
        positions[0].y += (pointer.y - positions[0].y) * 0.22;

        for (let index = 1; index < positions.length; index += 1) {
          positions[index].x += (positions[index - 1].x - positions[index].x) * 0.2;
          positions[index].y += (positions[index - 1].y - positions[index].y) * 0.2;
        }

        cursorDot.style.transform = `translate(${positions[0].x}px, ${positions[0].y}px)`;

        cursorTrail.forEach((element, index) => {
          element.style.transform = `translate(${positions[index + 1].x}px, ${positions[index + 1].y}px)`;
        });

        if (repelLetters.length) {
          const repelDistance = 150;

          repelLetters.forEach((letter) => {
            const letterBounds = letter.getBoundingClientRect();
            const letterCenterX = letterBounds.left + letterBounds.width / 2;
            const letterCenterY = letterBounds.top + letterBounds.height / 2;
            const deltaX = letterCenterX - pointer.x;
            const deltaY = letterCenterY - pointer.y;
            const distance = Math.hypot(deltaX, deltaY);

            if (distance < repelDistance && distance > 0) {
              const strength = (repelDistance - distance) / repelDistance;
              const offsetX = (deltaX / distance) * strength * 12;
              const offsetY = (deltaY / distance) * strength * 7;
              letter.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            } else {
              letter.style.transform = "translate(0, 0)";
            }
          });
        }

        requestAnimationFrame(animateCursor);
      };

      window.addEventListener("pointermove", updatePointer);
      window.addEventListener("pointerdown", playClickSound);
      window.addEventListener("touchstart", updateTouchPointer, { passive: true });
      window.addEventListener("touchmove", updateTouchPointer, { passive: true });
      requestAnimationFrame(animateCursor);
    </script>
  </body>
</html>
