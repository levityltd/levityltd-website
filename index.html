<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Levity Ltd</title>
    <link rel="icon" href="assets/cloud-icon.svg" type="image/svg+xml">
    <link rel="icon" href="assets/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="icon" href="assets/favicon-48.png" sizes="48x48" type="image/png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" sizes="180x180">
    <link rel="preload" as="image" href="assets/brand/Levity%20Logo_Negative.webp">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Satisfy&display=swap" rel="stylesheet">
    <style>
      :root {
        --levity-lilac: #b1a1ed;
        --levity-limelight: #c1ff72;
        --levity-eggplant: #564f74;
        --levity-fog: #d6d4d8;
        --levity-cloud: #fbfaf0;
        --font-body: "Nunito", system-ui, sans-serif;
        --font-accent: "Satisfy", cursive;
        --glass: rgba(255, 255, 255, 0.16);
        --glass-strong: rgba(255, 255, 255, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--levity-lilac);
        cursor: none;
      }

      body {
        min-height: 100dvh;
        position: relative;
        font-family: var(--font-body);
      }

      .hero-mark {
        display: block;
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        animation: logo-float 6s ease-in-out infinite;
        z-index: 2;
      }

      .logo {
        display: block;
        width: clamp(360px, 58vw, 520px);
        height: auto;
        aspect-ratio: 1 / 1;
        max-height: 58dvh;
        object-fit: contain;
      }

      .tagline {
        margin: -74px 0 0;
        color: #ffffff;
        width: min(62%, 322px);
        margin-left: auto;
        margin-right: auto;
        font-size: clamp(0.82rem, 1.42vw, 1.48rem);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.2;
        text-shadow:
          0 0 8px rgba(255, 255, 255, 0.78),
          0 0 18px rgba(255, 255, 255, 0.42);
        white-space: nowrap;
      }

      .contact-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin-top: 33px;
      }

      .secondary-actions {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
      }

      .contact-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 24px;
        border-radius: 999px;
        color: #ffffff;
        font-size: 0.98rem;
        font-weight: 800;
        line-height: 1;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .secondary-actions .contact-button {
        min-width: 104px;
      }

      .primary-button {
        background: var(--levity-limelight);
        color: var(--levity-eggplant);
      }

      .contact-button:hover,
      .contact-button:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(193, 255, 114, 0.45);
        outline: none;
      }

      @media (max-width: 640px) {
        .hero-mark {
          top: clamp(32px, 8svh, 56px);
          width: 100%;
          transform: translateX(-50%);
          animation-name: logo-float-mobile;
        }

        .logo {
          width: min(92vw, 440px);
          max-height: 58svh;
        }

        .tagline {
          margin-top: -64px;
          width: min(76%, 334px);
          font-size: clamp(0.72rem, 3.25vw, 1.04rem);
        }

      }

      .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08));
        border: 1px solid rgba(255, 255, 255, 0.3);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(12, 6, 34, 0.35);
      }

      @keyframes logo-float {
        0%,
        100% {
          transform: translate(-50%, -50%);
        }

        50% {
          transform: translate(-50%, calc(-50% - 14px));
        }
      }

      @keyframes logo-float-mobile {
        0%,
        100% {
          transform: translateX(-50%);
        }

        50% {
          transform: translate(-50%, -14px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-mark {
          animation: none;
        }
      }

      .cursor-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }

      .cursor-dot,
      .cursor-trail {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow:
          0 0 6px rgba(255, 255, 255, 0.9),
          0 0 12px rgba(255, 194, 236, 0.8),
          0 0 18px rgba(193, 255, 114, 0.7);
        transform: translate(-100px, -100px);
        transition: transform 0.02s linear;
      }

      .cursor-trail {
        width: 6px;
        height: 6px;
        opacity: 0.7;
        filter: blur(0.2px);
      }

      @media (pointer: coarse) {
        body {
          cursor: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="cursor-layer" aria-hidden="true">
      <div class="cursor-dot"></div>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
    </div>
    <main class="hero-mark" aria-label="Levity Ltd">
      <img class="logo" src="assets/brand/Levity%20Logo_Negative.webp" width="500" height="500" alt="Levity Ltd" fetchpriority="high">
      <p class="tagline">unique design for iconic founders</p>
      <nav class="contact-actions" aria-label="Contact Levity Ltd">
        <a class="contact-button primary-button" href="https://calendly.com/melissa-levity/30min" target="_blank" rel="noopener noreferrer">Book a Meeting</a>
        <div class="secondary-actions">
          <a class="contact-button glass-panel" href="https://levity.ltd/work">Work</a>
          <a class="contact-button glass-panel" href="https://levity.ltd/blog">Blog</a>
        </div>
      </nav>
    </main>
    <script>
      const cursorDot = document.querySelector(".cursor-dot");
      const cursorTrail = [...document.querySelectorAll(".cursor-trail")];
      const pointer = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      const positions = Array.from({ length: 12 }, () => ({ ...pointer }));

      const setPointerPosition = (x, y, shouldSnap = false) => {
        pointer.x = x;
        pointer.y = y;

        if (!shouldSnap) return;

        positions.forEach((position) => {
          position.x = x;
          position.y = y;
        });
      };

      const updatePointer = (event) => {
        setPointerPosition(event.clientX, event.clientY);
      };

      const updateTouchPointer = (event) => {
        const touch = event.touches && event.touches[0];
        if (!touch) return;
        setPointerPosition(touch.clientX, touch.clientY, event.type === "touchstart");
      };

      const animateCursor = () => {
        positions[0].x += (pointer.x - positions[0].x) * 0.22;
        positions[0].y += (pointer.y - positions[0].y) * 0.22;

        for (let index = 1; index < positions.length; index += 1) {
          positions[index].x += (positions[index - 1].x - positions[index].x) * 0.2;
          positions[index].y += (positions[index - 1].y - positions[index].y) * 0.2;
        }

        cursorDot.style.transform = `translate(${positions[0].x}px, ${positions[0].y}px)`;

        cursorTrail.forEach((element, index) => {
          element.style.transform = `translate(${positions[index + 1].x}px, ${positions[index + 1].y}px)`;
        });

        requestAnimationFrame(animateCursor);
      };

      window.addEventListener("pointermove", updatePointer);
      window.addEventListener("touchstart", updateTouchPointer, { passive: true });
      window.addEventListener("touchmove", updateTouchPointer, { passive: true });
      requestAnimationFrame(animateCursor);
    </script>
  </body>
</html>
