<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Levity Ltd</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Satisfy&display=swap" rel="stylesheet">
    <style>
      :root {
        --levity-lilac: #b1a1ed;
        --levity-limelight: #c1ff72;
        --levity-eggplant: #564f74;
        --levity-fog: #d6d4d8;
        --levity-cloud: #fbfaf0;
        --font-body: "Nunito", system-ui, sans-serif;
        --font-accent: "Satisfy", cursive;
        --glass: rgba(255, 255, 255, 0.16);
        --glass-strong: rgba(255, 255, 255, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--levity-lilac);
        cursor: none;
      }

      body {
        min-height: 100dvh;
        position: relative;
        font-family: var(--font-body);
      }

      .hero-mark {
        display: block;
        position: absolute;
        top: 30%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        animation: logo-float 6s ease-in-out infinite;
        z-index: 2;
      }

      .logo {
        display: block;
        width: clamp(360px, 58vw, 520px);
        max-height: 58dvh;
        object-fit: contain;
      }

      .tagline {
        margin: -74px 0 0;
        color: #ffffff;
        width: min(62%, 322px);
        margin-left: auto;
        margin-right: auto;
        font-size: clamp(0.82rem, 1.42vw, 1.48rem);
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.2;
        text-shadow:
          0 0 8px rgba(255, 255, 255, 0.78),
          0 0 18px rgba(255, 255, 255, 0.42);
        white-space: nowrap;
      }

      .contact-actions {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin-top: 33px;
      }

      .contact-button {
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border-radius: 50%;
        color: #ffffff;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .contact-button:hover,
      .contact-button:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(193, 255, 114, 0.45);
        outline: none;
      }

      .contact-button svg {
        width: 24px;
        height: 24px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      @media (max-width: 640px) {
        .logo {
          width: min(92vw, 440px);
        }

        .tagline {
          margin-top: -64px;
          width: min(76%, 334px);
          font-size: clamp(0.72rem, 3.25vw, 1.04rem);
        }

      }

      .glass-panel {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.08));
        border: 1px solid rgba(255, 255, 255, 0.3);
        -webkit-backdrop-filter: blur(14px);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(12, 6, 34, 0.35);
      }

      @keyframes logo-float {
        0%,
        100% {
          transform: translate(-50%, -50%);
        }

        50% {
          transform: translate(-50%, calc(-50% - 14px));
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero-mark {
          animation: none;
        }
      }

      .cursor-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
      }

      .cursor-dot,
      .cursor-trail {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow:
          0 0 6px rgba(255, 255, 255, 0.9),
          0 0 12px rgba(255, 194, 236, 0.8),
          0 0 18px rgba(193, 255, 114, 0.7);
        transform: translate(-100px, -100px);
        transition: transform 0.02s linear;
      }

      .cursor-trail {
        width: 6px;
        height: 6px;
        opacity: 0.7;
        filter: blur(0.2px);
      }

      @media (pointer: coarse) {
        body {
          cursor: default;
        }

        .cursor-layer {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="cursor-layer" aria-hidden="true">
      <div class="cursor-dot"></div>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
      <span class="cursor-trail"></span>
    </div>
    <main class="hero-mark" aria-label="Levity Ltd">
      <img class="logo" src="assets/brand/Levity%20Logo_Negative.png" alt="Levity Ltd">
      <p class="tagline">websites as unique as your business</p>
      <nav class="contact-actions" aria-label="Contact Levity Ltd">
        <a class="contact-button glass-panel" href="mailto:melissa@levity.ltd?subject=Website%20Inquiry" aria-label="Email Melissa at Levity Ltd" data-email-link>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6h16v12H4z"></path>
            <path d="m4 7 8 6 8-6"></path>
          </svg>
        </a>
        <a class="contact-button glass-panel" href="tel:7205855238" aria-label="Call Melissa at 720-585-5238">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.77.62 2.61a2 2 0 0 1-.45 2.11L8 9.72a16 16 0 0 0 6.28 6.28l1.28-1.28a2 2 0 0 1 2.11-.45c.84.29 1.71.5 2.61.62A2 2 0 0 1 22 16.92z"></path>
          </svg>
        </a>
      </nav>
    </main>
    <script>
      const cursorDot = document.querySelector(".cursor-dot");
      const cursorTrail = [...document.querySelectorAll(".cursor-trail")];
      const pointer = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
      };
      const positions = Array.from({ length: 12 }, () => ({ ...pointer }));

      const updatePointer = (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
      };

      const updateTouchPointer = (event) => {
        const touch = event.touches && event.touches[0];
        if (!touch) return;
        pointer.x = touch.clientX;
        pointer.y = touch.clientY;
      };

      const animateCursor = () => {
        positions[0].x += (pointer.x - positions[0].x) * 0.22;
        positions[0].y += (pointer.y - positions[0].y) * 0.22;

        for (let index = 1; index < positions.length; index += 1) {
          positions[index].x += (positions[index - 1].x - positions[index].x) * 0.2;
          positions[index].y += (positions[index - 1].y - positions[index].y) * 0.2;
        }

        cursorDot.style.transform = `translate(${positions[0].x}px, ${positions[0].y}px)`;

        cursorTrail.forEach((element, index) => {
          element.style.transform = `translate(${positions[index + 1].x}px, ${positions[index + 1].y}px)`;
        });

        requestAnimationFrame(animateCursor);
      };

      window.addEventListener("pointermove", updatePointer);
      window.addEventListener("touchstart", updateTouchPointer, { passive: true });
      window.addEventListener("touchmove", updateTouchPointer, { passive: true });
      requestAnimationFrame(animateCursor);

      document.querySelector("[data-email-link]").addEventListener("click", (event) => {
        event.preventDefault();
        const shouldOpenEmail = window.confirm("Open your email app to draft a message to Melissa?");
        if (!shouldOpenEmail) return;
        window.location.href = event.currentTarget.href;
      });
    </script>
  </body>
</html>
